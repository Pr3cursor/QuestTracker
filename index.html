<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestTracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <span class="app-title">&#9876; QuestTracker</span>
        </div>
        <div class="header-center">
            <div class="board-switcher">
                <select id="boardSelect" aria-label="Board wechseln"></select>
                <button class="icon-btn" id="renameBoardBtn" title="Board umbenennen">&#9998;</button>
                <button class="icon-btn" id="deleteBoardBtn" title="Board l&ouml;schen">&#128465;</button>
                <button class="add-board-btn" id="addBoardBtn" title="Neues Board">+ Board</button>
            </div>
        </div>
        <div class="header-right">
            <button id="themeToggleBtn" class="theme-toggle" aria-label="Dark Mode umschalten" title="Light/Dark Mode">
                <span id="themeIcon">&#127769;</span>
            </button>
        </div>
    </header>

    <div class="input-area">
        <div class="input-row">
            <input type="color" id="colorInput" value="#6c63ff" title="Issue-Farbe w&auml;hlen" class="color-picker">
            <input type="text" id="taskInput" placeholder="Issue-Titel..." style="flex:1">
        </div>
        <textarea id="descriptionInput" placeholder="Beschreibung: Worum geht es genau?" rows="3"></textarea>
        <textarea id="linksInput" placeholder="URLs (eine pro Zeile)&#10;z. B. https://github.com/..." rows="2"></textarea>
        <select id="priorityInput">
            <option value="1">Hoch</option>
            <option value="2" selected>Mittel</option>
            <option value="3">Niedrig</option>
        </select>
        <button onclick="addIssue()">+ Issue hinzuf&uuml;gen</button>
    </div>

    <div class="board" id="boardContainer"></div>

    <!-- Hidden column color picker -->
    <input type="color" id="colColorInput" style="position:fixed;opacity:0;pointer-events:none;width:0;height:0;" aria-hidden="true">

    <script src="script.js"></script>
</body>
</html>
